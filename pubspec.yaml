name: apix_example_app

description: "Example app demonstrating all apix features."

publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  apix:
    path: ../apix
  flutter_secure_storage: ^9.0.0
  sentry_flutter: ^8.0.0
  # Clean Architecture + BLoC
  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  get_it: ^7.6.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true